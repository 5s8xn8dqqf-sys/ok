<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control Interface</title>
    <!-- Liên kết với file CSS bên ngoài -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="panel-container">
        <div class="panel-title">System Module // 01</div>
        
        <button class="smooth-btn" id="smoothBtn" onclick="toggleSmooth()">Smooth: OFF</button>

        <div class="slider-wrapper" id="sliderWrapper">
            <div class="range-container">
                <input type="range" id="levelSlider" min="1" max="3" value="1" step="1" oninput="updateLevel()">
            </div>
            <div class="labels">
                <span id="lbl1" class="active-level">Nhẹ</span>
                <span id="lbl2">Trung Bình</span>
                <span id="lbl3">Mạnh</span>
            </div>
        </div>
    </div>

    <!-- Liên kết với file Javascript bên ngoài -->
    <script src="script.js"></script>
</body>
</html>
